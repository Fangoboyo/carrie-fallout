<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Scrapbook</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scrapbook-container">
        <header class="polaroid title-card">
            <h1>Our Video Scrapbook 📸</h1>
            <p class="handwriting">Memories to keep!</p>
        </header>

        <main id="app-content">
            <!-- Loading state initially -->
            <div style="text-align: center;">
                <p class="handwriting">Loading pages...</p>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
